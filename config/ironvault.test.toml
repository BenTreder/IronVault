[repo]
path = "/home/chr0nichacker/Projects/IronVault/.ironvault-test/repo"

[backup]
sources = ["/home/chr0nichacker/Projects/IronVault/.ironvault-test/source"]
one_file_system = true
follow_symlinks = false
parallelism = "4"
chunk_size = "4MiB"
compression = "zstd"
compression_level = 10

[retention]
keep_hourly = 6
keep_daily = 7
keep_weekly = 4
keep_monthly = 6
keep_yearly = 1

[safety]
require_root = false
require_repo_mount = false
repo_mount_point = "/home/chr0nichacker/Projects/IronVault/.ironvault-test"
minimum_free_space_gb = 1
prevent_if_pacman_running = false
prevent_if_pacman_lock_exists = false
prevent_if_backup_already_running = true
lock_file = "/home/chr0nichacker/Projects/IronVault/.ironvault-test/ironvault.lock"
never_restore_to_root = true

[excludes]
paths = []

[metadata]
save_package_list = false
save_enabled_services = false
save_block_devices = false
save_kernel_info = false

[notifications]
enabled = false
desktop_notifications = false

[logging]
log_dir = "/home/chr0nichacker/Projects/IronVault/.ironvault-test/logs"
log_level = "info"
